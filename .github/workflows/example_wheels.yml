on: 
  push:
    branches: [main]
  pull_request: {}

name: Build example wheels 

jobs:
  linux:
    runs-on: ubuntu-latest
    env:
      CXXFLAGS: "-std=c++11"
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
        target: [x86_64, aarch64]
    steps:
    - uses: actions/checkout@v2
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        default: true
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Build wheels
      uses: messense/maturin-action@v1
      with:
        maturin-version: 1.9.4
        target: ${{ matrix.target }}
        manylinux: '2_28'
        before-script-linux: |
          PYTHON_VERSION="${{ matrix.python-version }}"
          MAJOR="${PYTHON_VERSION%%.*}"
          MINOR="${PYTHON_VERSION##*.}"
          PYTHON_BIN="/opt/python/cp${MAJOR}${MINOR}-cp${MAJOR}${MINOR}/bin/python${PYTHON_VERSION}"
          PYTHON_LIBDIR=$("${PYTHON_BIN}" -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")
          export LIBRARY_PATH="${PYTHON_LIBDIR}${LIBRARY_PATH:+:${LIBRARY_PATH}}"
        args: -i python${{ matrix.python-version }} --release --manifest-path examples/pyo3-opentelemetry-lib/Cargo.toml --out dist

  windows: 
    runs-on: windows-latest 
    strategy: 
      matrix: 
        python-version: ['3.10', '3.12']
        target: [x64] 
    steps: 
      - uses: actions/checkout@v2 
      - uses: actions/setup-python@v2 
        with: 
          python-version: ${{ matrix.python-version }} 
          architecture: ${{ matrix.target }} 
      - name: Update rustup 
        run: rustup self update 
      - name: Install Rust toolchain 
        uses: actions-rs/toolchain@v1 
        with: 
          toolchain: stable 
          target: x86_64-pc-windows-msvc 
          profile: minimal 
          default: true 
      - name: Build wheels 
        uses: messense/maturin-action@v1 
        with:
          maturin-version: 1.9.4
          target: ${{ matrix.target }} 
          args: -i ${{ matrix.python-version }} --release --manifest-path examples/pyo3-opentelemetry-lib/Cargo.toml --out dist 
      - name: Install built wheel 
        run: | 
          pip install pyo3-opentelemetry-lib --find-links dist --force-reinstall --no-deps --no-index
  
  sdist:
    runs-on: ubuntu-latest
    env:
      CXXFLAGS: "-std=c++11"
    steps:
    - uses: actions/checkout@v2
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        default: true
    - uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Build sdist
      uses: messense/maturin-action@v1
      with:
        maturin-version: 1.9.4
        command: sdist
        args: --manifest-path examples/pyo3-opentelemetry-lib/Cargo.toml --out dist

