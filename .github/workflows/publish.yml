name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  cargo-publish:
    runs-on: ubuntu-latest
    if: |
      ${{ (github.event_name == 'release')
       || (github.event_name == 'workflow_dispatch') }}
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --workspace --locked --token ${{ secrets.CRATES_IO_TOKEN }}
